# EFD-PINNs 预提交检查配置
# 安装: uv run pre-commit install
# 手动运行: uv run pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      # Lint (含 import 排序)
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # 格式化
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements

  # 测试运行器 — 仅对修改的测试文件运行 pytest
  - repo: local
    hooks:
      - id: pytest-changed
        name: Run pytest on changed test files
        entry: bash -c 'PYTHONPATH=. uv run pytest -x -q --tb=short'
        language: system
        types: [python]
        files: ^tests/.*\.py$
        pass_filenames: true
        always_run: false
